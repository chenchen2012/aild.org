name: Mirror To Netlify Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    if: github.repository == 'chenchen2012/aild.org'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push site snapshot to Netlify-linked repo
        env:
          MIRROR_GH_TOKEN: ${{ secrets.MIRROR_GH_TOKEN }}
        run: |
          if [ -z "${MIRROR_GH_TOKEN}" ]; then
            echo "MIRROR_GH_TOKEN is missing."
            exit 1
          fi
          mirror_dir="$(mktemp -d)"
          rsync -a --delete \
            --exclude '.git/' \
            --exclude '.github/workflows/' \
            ./ "${mirror_dir}/"
          cd "${mirror_dir}"
          git init -b main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Mirror from chenchen2012/aild.org@${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${MIRROR_GH_TOKEN}@github.com/chenchen2012/AILD.git"
          git push --force origin main
