name: Mirror To Netlify Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    if: github.repository == 'chenchen2012/aild.org'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Netlify-linked repo
        env:
          MIRROR_GH_TOKEN: ${{ secrets.MIRROR_GH_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add netlify-mirror "https://x-access-token:${MIRROR_GH_TOKEN}@github.com/chenchen2012/AILD.git"
          git push netlify-mirror HEAD:main
