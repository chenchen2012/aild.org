[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/en"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/en/"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/es"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/es/"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/zh/en"
  to = "/zh/"
  status = 301
  force = true

[[redirects]]
  from = "/zh/en/"
  to = "/zh/"
  status = 301
  force = true

[[redirects]]
  from = "/zh/es"
  to = "/zh/"
  status = 301
  force = true

[[redirects]]
  from = "/zh/es/"
  to = "/zh/"
  status = 301
  force = true

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=600, stale-while-revalidate=86400"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap*.xml"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
